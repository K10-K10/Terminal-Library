name: Format

on:
  push:
    branches: [main]
  pull_request:

jobs:
  clang-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          files=$(git ls-files '*.cpp' '*.hpp' '*.h' '*.cc')
          if [ -n "$files" ]; then
            clang-format --dry-run --Werror $files
          fi
